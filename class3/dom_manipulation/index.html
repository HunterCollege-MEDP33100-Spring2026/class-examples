<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Manipulation</title>
</head>
<body>
    <!-- Exercise 1: getElementById -->
    <h2 id="ex1-heading">Change my text!</h2>

    <!-- Exercise 2: getElementsByClassName -->
    <div class="colored-box">Box 1</div>
    <div class="colored-box">Box 2</div>
    <div class="colored-box">Box 3</div>

    <!-- Exercise 3: querySelector -->
    <div id="ex3-box">Try to hide me!</div>

    <!-- Exercise 4: button click -->
    <button id="color-btn">Change Page Color</button>

    <!-- Exercise 5: real-time input -->
    <input type="text" id="text-input" placeholder="Start typing...">
    <p id="live-display">Nothing yet...</p>

    <!-- Exercise 6: mouse hover -->
    <p id="hover">Hover over me!</p>

    <script src="script.js"></script>
    
</body>
</html>
